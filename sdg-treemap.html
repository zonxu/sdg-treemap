<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>腾讯践行联合国可持续发展目标 SDGs (2024)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f5f4;
    --text: #1a1a1a;
    --text-light: #666;
    --text-muted: #999;
    --header-h: 90px;
    --top-offset: var(--header-h);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Noto Sans SC', 'Inter', -apple-system, 'PingFang SC', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--text);
  }

  /* ─── Header ─── */
  .header {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: #fff;
    z-index: 100;
    display: flex; flex-direction: column;
    justify-content: center;
    gap: 6px;
    border-bottom: 1px solid #e8e8e6;
    cursor: default; overflow: visible;
  }
  .header-top {
    display: flex; align-items: baseline;
    padding: 0 24px; flex-shrink: 0;
  }
  .main-title {
    font-size: 15px; font-weight: 700;
    letter-spacing: -0.2px; color: var(--text);
    white-space: nowrap;
  }
  .main-title .year {
    font-weight: 400; font-size: 13px;
    opacity: 0.35; margin-left: 6px;
  }
  .year-switcher {
    display: inline-flex; align-items: center;
    gap: 2px;
    margin-left: 8px;
    flex-shrink: 0;
  }
  .year-switcher .ys-item {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500;
    color: var(--text);
    opacity: 0.2;
    padding: 2px 6px;
    border-radius: 3px;
    text-decoration: none;
    cursor: pointer;
    transition: opacity 0.25s, background 0.25s;
    letter-spacing: -0.2px;
  }
  .year-switcher .ys-item:hover { opacity: 0.5; background: rgba(0,0,0,0.04); }
  .year-switcher .ys-item.active {
    opacity: 0.45; font-weight: 700;
    cursor: default;
  }
  .year-switcher .ys-item.active:hover { background: none; }

  .lang-switcher {
    position: fixed;
    top: 16px; right: 24px;
    z-index: 101;
    display: flex; align-items: center; gap: 2px;
  }
  .lang-switcher .ls-item {
    font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 500;
    color: var(--text);
    opacity: 0.2;
    padding: 3px 8px;
    border-radius: 3px;
    text-decoration: none;
    cursor: pointer;
    transition: opacity 0.25s, background 0.25s;
  }
  .lang-switcher .ls-item:hover { opacity: 0.5; background: rgba(0,0,0,0.04); }
  .lang-switcher .ls-item.active {
    opacity: 0.5; font-weight: 700;
    cursor: default;
  }
  .lang-switcher .ls-item.active:hover { background: none; }
  .lang-switcher .ls-sep {
    font-size: 10px; color: var(--text); opacity: 0.12;
  }

  /* ─── Preface Overlay ─── */
  .preface-overlay {
    position: fixed;
    top: var(--header-h);
    left: 0; right: 0; bottom: 0;
    z-index: 90;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.45s cubic-bezier(0.4,0,0.2,1);
  }
  .preface-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .preface-overlay .preface-backdrop {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(24px) saturate(1.2);
    -webkit-backdrop-filter: blur(24px) saturate(1.2);
  }
  .preface-overlay .preface-content {
    position: relative; z-index: 1;
    max-width: 520px; margin: 0 auto;
    padding: 0 32px; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center;
    transform: translateY(-12px);
    transition: transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.4s ease;
    opacity: 0;
  }
  .preface-overlay.show .preface-content {
    transform: translateY(0); opacity: 1;
  }
  .preface-overlay .preface-content p {
    font-size: 13.5px; font-weight: 400;
    line-height: 2.1; color: var(--text-light);
    letter-spacing: 0.2px; text-align: justify;
  }
  .preface-overlay .preface-content p + p { margin-top: 20px; }
  .preface-overlay .preface-content p:last-child {
    font-weight: 500; color: var(--text); opacity: 0.65;
  }


  /* ─── SDG Nav ─── */
  .sdg-nav {
    display: flex; align-items: flex-end;
    padding: 0 24px; height: 40px; flex-shrink: 0;
    padding-bottom: 8px;
    gap: 0; overflow: hidden;
  }
  .sdg-nav-item {
    flex-shrink: 0;
    display: flex; align-items: flex-end;
    justify-content: center;
    cursor: default;
    user-select: none;
    transition: opacity 0.2s ease;
  }
  .sdg-nav-item:hover { opacity: 1; }
  .sdg-nav-item .sdg-num-text {
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 600;
    color: var(--text);
    opacity: 0.35;
    letter-spacing: -0.3px;
    transition: opacity 0.2s;
    padding: 0 10px;
  }
  .sdg-nav-item:first-child .sdg-num-text { padding-left: 0; }
  .sdg-nav-item:hover .sdg-num-text { opacity: 1; color: var(--sdg-color); }
  .sdg-nav-sep {
    flex-shrink: 0;
    width: 1px;
    height: 28px;
    background: var(--text);
    opacity: 0.1;
    user-select: none;
    align-self: flex-end;
  }

  /* ─── Treemap ─── */
  .treemap {
    position: fixed;
    top: var(--top-offset);
    left: 0; right: 0; bottom: 0;
    overflow: hidden;
    background: var(--bg);
  }

  /* ─── Tile ─── */
  .tile {
    position: absolute;
    overflow: hidden;
    cursor: default;
    will-change: transform, opacity;
    transform-origin: 0 0;
    contain: layout style paint;
    backface-visibility: hidden;
  }

  .tile-inner {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    padding: 14px 16px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* SDG filter states */
  .tile.dimmed { filter: grayscale(0.6) brightness(0.88); opacity: 0.35; }
  .tile.highlighted { filter: brightness(1.03) saturate(1.3); }

  /* ─── Tile content ─── */
  .tile .sdg-badge {
    font-size: 9px; font-weight: 500;
    opacity: 0.4; letter-spacing: 0.2px;
    margin-bottom: 3px; flex-shrink: 0;
    white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis;
    transition: opacity 0.35s ease;
  }

  .tile .project-name {
    font-size: 13px; font-weight: 700;
    line-height: 1.35; letter-spacing: -0.2px;
    flex-shrink: 0; z-index: 1;
    overflow: hidden; text-overflow: ellipsis;
  }

  .tile .spacer { flex: 1; min-height: 2px; }

  .tile .number-block {
    flex-shrink: 0; z-index: 1; overflow: hidden;
  }
  .tile .number-row {
    display: flex; align-items: baseline; gap: 3px;
  }
  .tile .number-val {
    font-family: 'Inter', 'Noto Sans SC', sans-serif;
    font-weight: 900; line-height: 1;
    letter-spacing: -1.5px;
    font-variant-numeric: tabular-nums;
    opacity: 0.82;
  }
  .tile .number-unit {
    font-size: 12px; font-weight: 500;
    opacity: 0.45; letter-spacing: 0;
  }

  .tile .subtitle-text {
    font-size: 11px; font-weight: 500;
    line-height: 1.55; opacity: 0;
    margin-top: 6px; flex-shrink: 0; overflow: hidden;
    transition: opacity 0.35s ease;
    clip-path: inset(0 0 100% 0);
    transition: opacity 0.35s ease, clip-path 0.35s ease;
  }

  .tile .desc-text {
    font-size: 10.5px; font-weight: 400;
    line-height: 1.7; opacity: 0;
    margin-top: 4px; flex-shrink: 1; overflow: hidden;
    clip-path: inset(0 0 100% 0);
    transition: opacity 0.35s ease, clip-path 0.35s ease;
  }

  .tile .default-subtitle {
    font-size: 11px; font-weight: 400;
    line-height: 1.6; opacity: 0.45;
    flex-shrink: 0; overflow: hidden;
    margin-top: auto;
  }

  /* ─── 17 SDG Official Colors (pastel tint for bg, dark for text) ─── */
  .sdg-1  { --tile-bg: #fef3cd; --tile-text: #6b5a00; }
  .sdg-2  { --tile-bg: #fde0c5; --tile-text: #7a3d00; }
  .sdg-3  { --tile-bg: #f2d1e4; --tile-text: #6e1e4a; }
  .sdg-4  { --tile-bg: #e8f5cc; --tile-text: #4a6b00; }
  .sdg-5  { --tile-bg: #c8f5e8; --tile-text: #0a5c42; }
  .sdg-6  { --tile-bg: #fdd8d2; --tile-text: #7a2216; }
  .sdg-7  { --tile-bg: #d8d2f5; --tile-text: #2e1a6e; }
  .sdg-8  { --tile-bg: #cee8f8; --tile-text: #0e4a72; }
  .sdg-9  { --tile-bg: #c8d4f8; --tile-text: #142a6e; }
  .sdg-10 { --tile-bg: #d8d0f2; --tile-text: #36286a; }
  .sdg-11 { --tile-bg: #eecef5; --tile-text: #5c1470; }
  .sdg-12 { --tile-bg: #fdd4cc; --tile-text: #7a2010; }
  .sdg-13 { --tile-bg: #fde0c8; --tile-text: #7a4000; }
  .sdg-14 { --tile-bg: #ddf5cc; --tile-text: #3a6e0a; }
  .sdg-15 { --tile-bg: #d6cef5; --tile-text: #342870; }
  .sdg-16 { --tile-bg: #f2cedf; --tile-text: #6e1646; }
  .sdg-17 { --tile-bg: #e8c0c8; --tile-text: #6e0a20; }

  .tile[class*="sdg-"] {
    background: var(--tile-bg);
    color: var(--tile-text);
  }

  /* ─── Entrance ─── */
  .tile {
    opacity: 0;
    transform: translate(0,0) scale(0.92);
  }
  .tile.visible {
    opacity: 1;
    transform: translate(var(--tx, 0), var(--ty, 0));
    transition: opacity 0.6s cubic-bezier(0.25,0.46,0.45,0.94),
                transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  /* After entrance, remove CSS transition so JS controls smoothly */
  .tile.live {
    transition: none;
  }

  /* ─── Mobile Adaptation ─── */
  @media (max-width: 768px) {
    :root {
      --header-h: 76px;
    }

    /* Header */
    .header-top {
      padding: 0 14px;
      flex-wrap: wrap;
    }
    .main-title {
      font-size: 13px;
    }
    .year-switcher {
      margin-left: 4px;
    }
    .year-switcher .ys-item {
      font-size: 11px;
      padding: 2px 4px;
    }

    /* Lang switcher: flow inline instead of fixed */
    .lang-switcher {
      position: static;
      margin-left: auto;
    }
    .lang-switcher .ls-item {
      font-size: 10px;
      padding: 2px 6px;
    }
    .lang-switcher .ls-sep {
      font-size: 9px;
    }

    /* SDG Nav: horizontal scroll */
    .sdg-nav {
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 0 12px;
      height: 34px;
      padding-bottom: 6px;
      scrollbar-width: none;          /* Firefox */
      -ms-overflow-style: none;       /* IE/Edge */
    }
    .sdg-nav::-webkit-scrollbar {
      display: none;                  /* Chrome/Safari */
    }
    .sdg-nav-item .sdg-num-text {
      font-size: 10px;
      padding: 0 6px;
    }
    .sdg-nav-sep {
      height: 18px;
    }

    /* Tile padding tweak */
    .tile-inner {
      padding: 10px 12px;
    }

    /* ─── Bottom Sheet ─── */
    .bottom-sheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      z-index: 200;
      background: #fff;
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      max-height: 50vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      will-change: transform;
    }
    .bottom-sheet.open {
      transform: translateY(0);
    }
    .bs-handle {
      width: 40px; height: 4px;
      background: #ccc; border-radius: 2px;
      margin: 10px auto 0;
    }
    .bs-content {
      padding: 12px 20px 20px;
    }
    .bs-badge {
      display: inline-block;
      font-size: 11px; font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .bs-title {
      font-size: 16px; font-weight: 700;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 6px;
    }
    .bs-numbers {
      font-family: 'Inter', sans-serif;
      font-size: 28px; font-weight: 900;
      line-height: 1.2;
      letter-spacing: -1px;
      color: var(--text);
      opacity: 0.85;
      margin-bottom: 4px;
    }
    .bs-subtitle {
      font-size: 13px; font-weight: 500;
      line-height: 1.6;
      color: var(--text-light);
      margin-bottom: 6px;
    }
    .bs-desc {
      font-size: 12.5px; font-weight: 400;
      line-height: 1.8;
      color: var(--text-light);
    }
    .bs-nav {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid #eee;
    }
    .bs-prev, .bs-next {
      font-size: 22px; font-weight: 600;
      color: var(--text);
      opacity: 0.3;
      cursor: pointer;
      padding: 4px 12px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .bs-prev:active, .bs-next:active { opacity: 0.6; }
    .bs-indicator {
      font-family: 'Inter', sans-serif;
      font-size: 12px; font-weight: 500;
      color: var(--text-muted);
    }

    /* Tile selection states for bottom sheet */
    .tile.selected {
      filter: brightness(1.05) saturate(1.3);
      z-index: 10 !important;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12) !important;
    }
    .tile.sheet-dimmed {
      filter: grayscale(0.5) brightness(0.92);
      opacity: 0.4;
    }
  }

</style>
</head>
<body>

<div class="header" id="header">
  <div class="header-top">
    <div class="main-title" id="titleText">
      腾讯践行联合国可持续发展目标 SDGs
    </div>
    <span class="year-switcher">
      <span class="ys-item active">2024</span>
      <a href="sdg-treemap-2023.html" class="ys-item">2023</a>
    </span>
    <div class="lang-switcher"><span class="ls-item active">中</span><span class="ls-sep">/</span><a href="sdg-treemap-en.html" class="ls-item">EN</a></div>
  </div>
  <div class="sdg-nav" id="sdgNav"></div>
</div>

<div class="preface-overlay" id="prefaceOverlay">
  <div class="preface-backdrop"></div>
  <div class="preface-content">
    <p>企业作为经济社会复杂系统中的重要主体，在实现可持续发展目标中起到关键作用。考虑到外部环境复杂多变，腾讯在"用户为本，科技向善"的使命愿景下，以"可持续社会价值创新"战略为引领，不断深化基于内外部环境变化与企业自身发展战略的SDGs实践，以自身数字化能力与可持续发展能力两个核心能力为支撑，探索商业价值与社会价值的共生发展之路，让善意生长出更多可能。</p>
    <p>独行者快，众行者远！我们希望与更多伙伴携手，共同构建践行 SDGs 的价值生态，共创美好繁荣世界！</p>
  </div>
</div>

<div class="treemap" id="treemap"></div>

<div class="bottom-sheet" id="bottomSheet">
  <div class="bs-handle"></div>
  <div class="bs-content" id="bsContent">
    <span class="bs-badge"></span>
    <div class="bs-title"></div>
    <div class="bs-numbers"></div>
    <div class="bs-subtitle"></div>
    <div class="bs-desc"></div>
    <div class="bs-nav">
      <span class="bs-prev">‹</span>
      <span class="bs-indicator"></span>
      <span class="bs-next">›</span>
    </div>
  </div>
</div>



<script>
(function() {
'use strict';

/* ═══════════════════════════════════════════════════════════
   TEXT METRICS CACHE — Canvas pre-measurement
   ═══════════════════════════════════════════════════════════ */
const TMC = (() => {
  const c = document.createElement('canvas').getContext('2d');
  const m = new Map();
  function measure(text, size, weight, family) {
    const k = text + '|' + size + '|' + weight;
    if (m.has(k)) return m.get(k);
    c.font = weight + ' ' + size + 'px ' + family;
    const r = { w: c.measureText(text).width, h: size * 1.35 };
    m.set(k, r);
    return r;
  }
  function precompute(d) {
    const sf = "'Noto Sans SC',sans-serif";
    const nf = "'Inter',sans-serif";
    d._tm = {};
    // Project name at each tier
    [16,14.5,13,11,10,9,8].forEach(s => { d._tm['n'+s] = measure(d.project, s, '700', sf); });
    // Numbers
    if (d.numbers) d.numbers.forEach((n,i) => {
      [52,40,30,22,18,15,13].forEach(s => { d._tm['v'+i+'_'+s] = measure(formatNumber(n), s, '900', nf); });
    });
    // Badge
    const badgeText = String(d.sdg).padStart(2,'0') + '. ' + SDG_NAMES[d.sdg];
    [9.5,9,8.5,8,7.5,7,6.5].forEach(s => { d._tm['b'+s] = measure(badgeText, s, '500', sf); });
    // Subtitle (measure first line, ~30 chars)
    if (d.subtitle) {
      const subText = d.subtitle.replace(/\n.*/,'').substring(0,30);
      [11,10.5,10,9,8.5,8,7].forEach(s => { d._tm['s'+s] = measure(subText, s, '500', sf); });
    }
    // Desc (measure first ~25 chars)
    if (d.desc) {
      const descText = d.desc.substring(0,25);
      [10.5,10,9.5,8.5,8,7.5,7].forEach(s => { d._tm['d'+s] = measure(descText, s, '400', sf); });
    }
  }
  return { measure, precompute };
})();

/* ═══════════════════════════════════════════════════════════
   DATA
   ═══════════════════════════════════════════════════════════ */
const SDG_NAMES = {
  1:'无贫穷', 2:'零饥饿', 3:'良好健康与福祉',
  4:'优质教育', 5:'性别平等', 6:'清洁饮水和卫生设施',
  7:'经济适用的清洁能源', 8:'体面工作和经济增长', 9:'产业、创新和基础设施',
  10:'减少不平等', 11:'可持续的城市和社区',
  12:'负责任的消费和生产', 13:'气候行动',
  14:'水下生物', 15:'陆地生物',
  16:'和平、正义与强大机构', 17:'促进目标实现的伙伴关系'
};
// Official SDG colors (vibrant) for nav hover and hover interpolation
const SDG_COLORS = {
  1:'#E5CD00', 2:'#E5920D', 3:'#D4628B', 4:'#BED32E', 5:'#4CC9A2',
  6:'#E26B56', 7:'#7B52C2', 8:'#5CB8E6', 9:'#3B6DC6', 10:'#8B78C6',
  11:'#C946C9', 12:'#E25040', 13:'#E8943A', 14:'#BFEA50', 15:'#9B82D6',
  16:'#D66A9E', 17:'#A51040'
};

// HSL for hover color interpolation
const SDG_HSL = {};
for (let i = 1; i <= 17; i++) {
  // will be parsed from CSS custom properties
  SDG_HSL[i] = null;
}

const DATA = [
  { sdg:1, project:'耕耘者振兴计划', numbers:['1600'], units:['万'], subtitle:'"村级服务平台"服务村民超1600万', desc:'2021年5月启动，投入5亿元资金，3年线下培训10万名、线上培训100万农业农村基层人才。"村级服务平台"入驻8万余村庄，服务村民超1600万。2025年2月接入腾讯混元等大模型发布"小耕"智能体。' },

/* ═══════════════════════════════════════════════════════════
   SQUARIFY + FROZEN ROW TREEMAP
   ═══════════════════════════════════════════════════════════ */

function worstRatio(strip, totalArea, side) {
  const len = totalArea / side;
  let worst = 0;
  for (let i = 0; i < strip.length; i++) {
    const il = strip[i].area / len;
    const r = Math.max(len / il, il / len);
    if (r > worst) worst = r;
  }
  return worst;
}

// Frozen row TREE structure (recursive, not flat)
// Each node: { indices: number[], isH: boolean, rest: node|null, stripFrac: number }
let frozenTree = null;

function freezeRows(items, rect) {
  const totalW = items.reduce((s, d) => s + d.baseWeight, 0);
  const sorted = items.map(d => ({
    _i: d._i, area: (d.baseWeight / totalW) * rect.w * rect.h, baseWeight: d.baseWeight
  })).sort((a, b) => b.area - a.area);
  frozenTree = _buildTree(sorted, { ...rect });
}

function _buildTree(items, rect) {
  if (!items.length) return null;
  if (items.length === 1) {
    return { indices: [items[0]._i], isH: rect.w >= rect.h, rest: null, stripFrac: 1 };
  }
  const isH = rect.w >= rect.h;
  const side = isH ? rect.h : rect.w;
  let strip = [], stripArea = 0, best = Infinity;
  for (let i = 0; i < items.length; i++) {
    const testStrip = [...strip, items[i]];
    const testArea = stripArea + items[i].area;
    const r = worstRatio(testStrip, testArea, side);
    if (r <= best) { strip = testStrip; stripArea = testArea; best = r; }
    else break;
  }
  const totalArea = items.reduce((s, d) => s + d.area, 0);
  const frac = stripArea / totalArea;
  const rest = items.slice(strip.length);
  let restNode = null;
  if (rest.length) {
    const sz = (isH ? rect.w : rect.h) * frac;
    const nr = isH
      ? { x: rect.x + sz, y: rect.y, w: rect.w - sz, h: rect.h }
      : { x: rect.x, y: rect.y + sz, w: rect.w, h: rect.h - sz };
    restNode = _buildTree(rest, nr);
  }
  return { indices: strip.map(s => s._i), isH, rest: restNode, stripFrac: frac };
}

const GAP = 2;

function computeFrozenLayout(rect) {
  if (!frozenTree) return;
  _layoutTree(frozenTree, rect);
}

function _layoutTree(node, rect) {
  if (!node) return;

  // Calculate current strip weight and rest weight
  let stripW = 0;
  node.indices.forEach(idx => stripW += DATA[idx].smoothWeight);
  let restW = 0;
  if (node.rest) _sumTreeWeight(node.rest, w => restW += w);
  const totalW = stripW + restW;
  if (totalW === 0) return;

  const isH = node.isH;
  const stripFrac = stripW / totalW;

  // Strip region
  const stripSz = (isH ? rect.w : rect.h) * stripFrac;
  const sX = rect.x, sY = rect.y;
  const sW = isH ? stripSz : rect.w;
  const sH = isH ? rect.h : stripSz;

  // Lay out tiles within the strip
  let off = 0;
  node.indices.forEach(idx => {
    const tf = DATA[idx].smoothWeight / stripW;
    const ext = (isH ? sH : sW) * tf;
    const tx = (isH ? sX : sX + off) + GAP / 2;
    const ty = (isH ? sY + off : sY) + GAP / 2;
    const tw = Math.max(0, (isH ? sW : ext) - GAP);
    const th = Math.max(0, (isH ? ext : sH) - GAP);
    targetLayout[idx] = { x: tx, y: ty, w: tw, h: th };
    off += ext;
  });

  // Rest region — recurse
  if (node.rest) {
    const restRect = isH
      ? { x: rect.x + stripSz, y: rect.y, w: rect.w - stripSz, h: rect.h }
      : { x: rect.x, y: rect.y + stripSz, w: rect.w, h: rect.h - stripSz };
    _layoutTree(node.rest, restRect);
  }
}

function _sumTreeWeight(node, cb) {
  if (!node) return;
  node.indices.forEach(idx => cb(DATA[idx].smoothWeight));
  if (node.rest) _sumTreeWeight(node.rest, cb);
}

function getVis(idx, w, h) {
  const d = DATA[idx];
  const tm = d._tm;

  // Padding tiers based on min dimension
  const mn = Math.min(w, h);
  const pad = mn > 200 ? 14 : mn > 100 ? 11 : mn > 60 ? 8 : 6;
  const aw = w - pad * 2;  // available width
  const ah = h - pad * 2;  // available height

  if (aw < 10 || ah < 10) {
    return { nfs:8, nvfs:13, nufs:6.5, badgeFs:6.5, subFs:7, descFs:7, pad,
             showName:false, showNum:false, subOpacity:0, descOpacity:0, defSubOpacity:0 };
  }

  // 1. Badge: find largest size that fits width
  const badgeSizes = [9.5,9,8.5,8,7.5,7,6.5];
  let badgeFs = 6.5;
  for (const s of badgeSizes) {
    if (tm['b'+s] && tm['b'+s].w <= aw) { badgeFs = s; break; }
  }
  const badgeH = badgeFs * 1.35 + 3; // height + margin

  // 2. Project name: find largest size that fits
  const nameSizes = [16,14.5,13,11,10,9,8];
  let nfs = 8;
  for (const s of nameSizes) {
    if (tm['n'+s] && tm['n'+s].w <= aw * 2.2) { nfs = s; break; }
    // allow up to ~2.2x width (wrapping 2 lines)
  }
  const nameLines = tm['n'+nfs] ? Math.ceil(tm['n'+nfs].w / aw) : 1;
  const nameH = nfs * 1.35 * Math.min(nameLines, 3);

  let usedH = badgeH + nameH;
  let remainH = ah - usedH;

  const showName = ah > badgeH + nfs * 1.2;

  // 3. Numbers
  const numSizes = [52,40,30,22,18,15,13];
  const unitSizes = [15,13,11,9,8,7,6.5];
  let nvfs = 13, nufs = 6.5;
  let numH = 0;
  const hasNum = d.numbers && d.numbers.length > 0;
  let showNum = false;

  if (hasNum && remainH > 20) {
    // Find largest number font that fits
    for (let si = 0; si < numSizes.length; si++) {
      const s = numSizes[si];
      let fits = true;
      let totalNumH = 0;
      for (let ni = 0; ni < d.numbers.length; ni++) {
        const key = 'v' + ni + '_' + s;
        if (tm[key] && tm[key].w <= aw * 0.85) {
          totalNumH += s * 1.1;
        } else { fits = false; break; }
      }
      if (fits && totalNumH <= remainH * 0.7) {
        nvfs = s; nufs = unitSizes[si]; numH = totalNumH; showNum = true; break;
      }
    }
    if (showNum) { usedH += numH; remainH = ah - usedH; }
  }

  // 4. Subtitle
  const subSizes = [11,10.5,10,9,8.5,8,7];
  let subFs = 7, subOpacity = 0;
  if (d.subtitle && remainH > 18) {
    for (const s of subSizes) {
      if (tm['s'+s] && tm['s'+s].w <= aw * 2.5) {
        subFs = s;
        const subLineH = s * 1.55;
        if (remainH > subLineH + 6) { subOpacity = remainH > 60 ? 0.55 : 0.35; }
        break;
      }
    }
    if (subOpacity > 0) { usedH += subFs * 1.55 + 6; remainH = ah - usedH; }
  }

  // 5. Description
  const descSizes = [10.5,10,9.5,8.5,8,7.5,7];
  let descFs = 7, descOpacity = 0;
  if (d.desc && remainH > 20 && subOpacity > 0) {
    for (const s of descSizes) {
      if (tm['d'+s] && tm['d'+s].w <= aw * 2) {
        descFs = s;
        descOpacity = remainH > 50 ? 0.4 : remainH > 30 ? 0.25 : 0;
        break;
      }
    }
  }

  // 6. Default subtitle (for tiles without numbers) — mutually exclusive with subtitle
  const defSubOpacity = (subOpacity === 0 && !hasNum && d.subtitle && remainH > 20) ? 0.4 : 0;

  return { nfs, nvfs, nufs, badgeFs, subFs, descFs, pad,
           showName, showNum, subOpacity, descOpacity, defSubOpacity };
}

/* ═══════════════════════════════════════════════════════════
   CURSOR INTERACTION — Gaussian + color/shadow
   ═══════════════════════════════════════════════════════════ */
function updateWeights() {
  if (!cursorIn || cx < 0) {
    DATA.forEach(d => { d.targetWeight = d.baseWeight; d._hover = 0; });
    return;
  }
  for (let i = 0; i < DATA.length; i++) {
    const l = currentLayout[i];
    const dx = cx - (l.x + l.w / 2);
    const dy = cy - (l.y + l.h / 2);
    const dist = Math.sqrt(dx*dx + dy*dy);
    const nd = dist / CURSOR_R;
    const inf = Math.exp(-nd * nd * 2.5);
    DATA[i].targetWeight = DATA[i].baseWeight * (MIN_SHRINK + (MAX_BOOST - MIN_SHRINK) * inf);
    DATA[i]._hover = inf;
  }
}

function smoothWeights() {
  let mx = 0;
  for (let i = 0; i < DATA.length; i++) {
    const d = DATA[i];
    const dw = d.targetWeight - d.smoothWeight;
    d.smoothWeight += dw * W_LERP;
    if (Math.abs(dw) > mx) mx = Math.abs(dw);
    // Smooth hover
    const dh = d._hover - d._smoothHover;
    d._smoothHover += dh * HOVER_LERP;
  }
  return mx;
}

/* ═══════════════════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════════════════ */
function computeLayout() {
  const W = treemapEl.clientWidth;
  const H = treemapEl.clientHeight;
  if (W === 0 || H === 0) return;
  computeFrozenLayout({ x: 0, y: 0, w: W, h: H });
}

function interpolateLayout() {
  let mx = 0;
  for (let i = 0; i < currentLayout.length; i++) {
    const c = currentLayout[i], t = targetLayout[i];
    c.x += (t.x - c.x) * LERP;
    c.y += (t.y - c.y) * LERP;
    c.w += (t.w - c.w) * LERP;
    c.h += (t.h - c.h) * LERP;
    const d = Math.max(Math.abs(t.x-c.x), Math.abs(t.y-c.y), Math.abs(t.w-c.w), Math.abs(t.h-c.h));
    if (d > mx) mx = d;
  }
  return mx;
}

/* ═══════════════════════════════════════════════════════════
   APPLY LAYOUT — translate for position, width/height for size
   ═══════════════════════════════════════════════════════════ */
function applyLayout() {
  for (let i = 0; i < tileEls.length; i++) {
    const el = tileEls[i];
    const l = currentLayout[i];
    const r = refs[i];
    const d = DATA[i];
    const w = l.w, h = l.h;
    const hv = d._smoothHover;

    // Position via transform, size via w/h
    el.style.transform = `translate(${l.x}px, ${l.y}px)`;
    el.style.width = w + 'px';
    el.style.height = h + 'px';

    // Hover: color interpolation + shadow + glow
    if (hv > 0.02) {
      const hsl = SDG_HSL[d.sdg];
      const lB = hv * 5;
      const sB = hv * 10;
      el.style.background = `hsl(${hsl[0]}, ${hsl[1] + sB}%, ${hsl[2] + lB}%)`;
      // Elevated shadow
      const shadowY = hv * 8;
      const shadowBlur = hv * 20;
      const shadowAlpha = hv * 0.15;
      el.style.boxShadow = `0 ${shadowY}px ${shadowBlur}px rgba(0,0,0,${shadowAlpha})`;
      el.style.zIndex = Math.round(hv * 10) + '';
    } else {
      el.style.background = '';
      el.style.boxShadow = '';
      el.style.zIndex = '';
    }

    // Content visibility — continuous adaptation
    const vis = getVis(i, w, h);
    const pv = prevVis[i];
    const changed = !pv ||
      pv.nfs !== vis.nfs || pv.showName !== vis.showName ||
      pv.showNum !== vis.showNum || pv.subOpacity !== vis.subOpacity ||
      pv.descOpacity !== vis.descOpacity || pv.defSubOpacity !== vis.defSubOpacity;

    if (changed) {
      prevVis[i] = { ...vis };

      // Padding
      const inner = el.querySelector('.tile-inner');
      if (inner) inner.style.padding = vis.pad + 'px';

      if (r.badge) {
        r.badge.style.fontSize = vis.badgeFs + 'px';
        r.badge.style.opacity = '0.4';
        r.badge.style.display = vis.showName ? '' : 'none';
      }
      if (r.name) {
        r.name.style.fontSize = vis.nfs + 'px';
        r.name.style.display = vis.showName ? '' : 'none';
      }
      if (r.numBlock) {
        r.numBlock.style.display = vis.showNum ? '' : 'none';
        if (vis.showNum) {
          r.numVals.forEach(v => v.style.fontSize = vis.nvfs + 'px');
          r.numUnits.forEach(u => u.style.fontSize = vis.nufs + 'px');
        }
      }
      if (r.sub) {
        r.sub.style.fontSize = vis.subFs + 'px';
        r.sub.style.opacity = vis.subOpacity + '';
        r.sub.style.clipPath = vis.subOpacity > 0 ? 'inset(0 0 0 0)' : 'inset(0 0 100% 0)';
      }
      if (r.desc) {
        r.desc.style.fontSize = vis.descFs + 'px';
        r.desc.style.opacity = vis.descOpacity + '';
        r.desc.style.clipPath = vis.descOpacity > 0 ? 'inset(0 0 0 0)' : 'inset(0 0 100% 0)';
      }
      if (r.defSub) {
        r.defSub.style.fontSize = vis.subFs + 'px';
        r.defSub.style.opacity = vis.defSubOpacity + '';
        r.defSub.style.display = vis.defSubOpacity > 0 ? '' : 'none';
      }
    }
  }
}

/* ═══════════════════════════════════════════════════════════
   ANIMATION LOOP
   ═══════════════════════════════════════════════════════════ */
let animating = false;

function tick() {
  const wd = smoothWeights();
  computeLayout();
  const pd = interpolateLayout();
  applyLayout();
  if (wd > 0.01 || pd > 0.3) { animating = true; requestAnimationFrame(tick); }
  else animating = false;
}

function startAnim() { if (!animating) { animating = true; requestAnimationFrame(tick); } }

/* ═══════════════════════════════════════════════════════════
   MOBILE DETECTION
   ═══════════════════════════════════════════════════════════ */
let isMobile = window.matchMedia('(max-width:768px)').matches;
window.addEventListener('resize', () => {
  isMobile = window.matchMedia('(max-width:768px)').matches;
});

/* ═══════════════════════════════════════════════════════════
   MOUSE EVENTS (PC only)
   ═══════════════════════════════════════════════════════════ */
treemapEl.addEventListener('mousemove', e => {
  if (isMobile) return;
  const b = treemapEl.getBoundingClientRect();
  cx = e.clientX - b.left; cy = e.clientY - b.top;
  cursorIn = true; updateWeights(); startAnim();
});
treemapEl.addEventListener('mouseleave', () => {
  if (isMobile) return;
  cursorIn = false; cx = cy = -1; updateWeights(); startAnim();
});

/* ═══════════════════════════════════════════════════════════
   TOUCH EVENTS — mobile: tap-to-select; PC: Gaussian explore
   ═══════════════════════════════════════════════════════════ */
let touchActive = false, longPressT = null, touchExploring = false;
let touchStartX = 0, touchStartY = 0;

treemapEl.addEventListener('touchstart', e => {
  if (isMobile) {
    // Don't prevent default — let scroll work if needed
    const t = e.touches[0];
    touchStartX = t.clientX; touchStartY = t.clientY;
    touchActive = true;
    return;
  }
  // PC fallback (tablet with mouse+touch)
  e.preventDefault();
  const t = e.touches[0], b = treemapEl.getBoundingClientRect();
  cx = t.clientX - b.left; cy = t.clientY - b.top;
  touchStartX = cx; touchStartY = cy;
  cursorIn = true; touchActive = true;
  longPressT = setTimeout(() => { touchExploring = true; }, 400);
  updateWeights(); startAnim();
}, { passive: false });

treemapEl.addEventListener('touchmove', e => {
  if (isMobile) return; // mobile: no Gaussian
  e.preventDefault();
  if (!touchActive) return;
  const t = e.touches[0], b = treemapEl.getBoundingClientRect();
  const nx = t.clientX - b.left, ny = t.clientY - b.top;
  if (!touchExploring && Math.hypot(nx - touchStartX, ny - touchStartY) > 10) {
    clearTimeout(longPressT); touchExploring = true;
  }
  cx = nx; cy = ny; updateWeights(); startAnim();
}, { passive: false });

treemapEl.addEventListener('touchend', e => {
  if (isMobile) {
    if (!touchActive) return;
    touchActive = false;
    const t = e.changedTouches[0];
    // Only trigger tap if finger didn't move much
    if (Math.hypot(t.clientX - touchStartX, t.clientY - touchStartY) < 15) {
      e.preventDefault();
      const b = treemapEl.getBoundingClientRect();
      const x = t.clientX - b.left, y = t.clientY - b.top;
      const idx = hitTestTile(x, y);
      if (idx >= 0) {
        openSheet(idx);
      } else {
        closeSheet();
      }
    }
    return;
  }
  e.preventDefault(); clearTimeout(longPressT);
  if (!touchExploring && touchActive) {
    setTimeout(() => { cursorIn = false; cx = cy = -1; updateWeights(); startAnim(); }, 3000);
  } else { cursorIn = false; cx = cy = -1; updateWeights(); startAnim(); }
  touchActive = false; touchExploring = false;
}, { passive: false });

treemapEl.addEventListener('touchcancel', () => {
  clearTimeout(longPressT); cursorIn = false; cx = cy = -1;
  touchActive = false; touchExploring = false;
  if (!isMobile) { updateWeights(); startAnim(); }
});

/* ═══════════════════════════════════════════════════════════
   BOTTOM SHEET — Mobile Detail Panel
   ═══════════════════════════════════════════════════════════ */
const bottomSheet = document.getElementById('bottomSheet');
const bsContent = document.getElementById('bsContent');
let sheetIndex = -1;
let bsTouchStartX = 0, bsTouchStartY = 0, bsTouchStartTime = 0;

function hitTestTile(x, y) {
  for (let i = 0; i < currentLayout.length; i++) {
    const l = currentLayout[i];
    if (x >= l.x && x <= l.x + l.w && y >= l.y && y <= l.y + l.h) return i;
  }
  return -1;
}

function openSheet(index) {
  if (index < 0 || index >= DATA.length) return;
  sheetIndex = index;
  const d = DATA[index];
  const sdgNum = String(d.sdg).padStart(2, '0');

  bsContent.querySelector('.bs-badge').textContent = sdgNum + '. ' + SDG_NAMES[d.sdg];
  bsContent.querySelector('.bs-title').textContent = d.project;

  // Numbers
  const numEl = bsContent.querySelector('.bs-numbers');
  if (d.numbers && d.numbers.length > 0) {
    numEl.innerHTML = d.numbers.map((n, i) =>
      formatNumber(n) + (d.units && d.units[i] ? '<small style="font-size:14px;font-weight:500;opacity:0.5;margin-left:2px">' + d.units[i] + '</small>' : '')
    ).join('<br>');
    numEl.style.display = '';
  } else {
    numEl.innerHTML = '';
    numEl.style.display = 'none';
  }

  bsContent.querySelector('.bs-subtitle').textContent = d.subtitle || '';
  bsContent.querySelector('.bs-desc').textContent = d.desc || '';
  bsContent.querySelector('.bs-indicator').textContent = (index + 1) + ' / ' + DATA.length;

  // Tile highlight
  tileEls.forEach((el, i) => {
    el.classList.toggle('selected', i === index);
    el.classList.toggle('sheet-dimmed', i !== index);
  });

  bottomSheet.classList.add('open');
}

function closeSheet() {
  bottomSheet.classList.remove('open');
  sheetIndex = -1;
  tileEls.forEach(el => {
    el.classList.remove('selected', 'sheet-dimmed');
  });
}

function navigateSheet(delta) {
  let next = sheetIndex + delta;
  if (next < 0) next = 0;
  if (next >= DATA.length) next = DATA.length - 1;
  if (next !== sheetIndex) openSheet(next);
}

// Nav buttons
bottomSheet.querySelector('.bs-prev').addEventListener('click', () => navigateSheet(-1));
bottomSheet.querySelector('.bs-next').addEventListener('click', () => navigateSheet(1));

// Swipe & drag-down on bottom sheet
bottomSheet.addEventListener('touchstart', e => {
  const t = e.touches[0];
  bsTouchStartX = t.clientX;
  bsTouchStartY = t.clientY;
  bsTouchStartTime = Date.now();
}, { passive: true });

bottomSheet.addEventListener('touchend', e => {
  const t = e.changedTouches[0];
  const dx = t.clientX - bsTouchStartX;
  const dy = t.clientY - bsTouchStartY;
  const dt = Date.now() - bsTouchStartTime;
  if (dt > 500) return; // too slow, not a swipe
  // Horizontal swipe
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    e.preventDefault();
    navigateSheet(dx < 0 ? 1 : -1);
    return;
  }
  // Vertical swipe down to close
  if (dy > 80 && dy > Math.abs(dx) * 1.5) {
    e.preventDefault();
    closeSheet();
  }
}, { passive: false });

// Stop event propagation so treemap doesn't get taps through the sheet
bottomSheet.addEventListener('click', e => e.stopPropagation());

/* ═══════════════════════════════════════════════════════════
   SDG NAV — Mobile tap opens first project of that SDG
   ═══════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
function init() {
  parseSDGColors();
  createTiles();

  DATA.forEach(d => { d.smoothWeight = d.baseWeight; d.targetWeight = d.baseWeight; d._smoothHover = 0; });

  const W = treemapEl.clientWidth, H = treemapEl.clientHeight;
  freezeRows(DATA, { x: 0, y: 0, w: W, h: H });
  computeFrozenLayout({ x: 0, y: 0, w: W, h: H });

  for (let i = 0; i < DATA.length; i++) currentLayout[i] = { ...targetLayout[i] };
  applyLayout();
}

let resizeT;
window.addEventListener('DOMContentLoaded', init);
window.addEventListener('resize', () => {
  clearTimeout(resizeT);
  resizeT = setTimeout(() => {
    DATA.forEach(d => { d.smoothWeight = d.baseWeight; d.targetWeight = d.baseWeight; d._smoothHover = 0; });
    prevVis = new Array(DATA.length).fill(null);
    const W = treemapEl.clientWidth, H = treemapEl.clientHeight;
    freezeRows(DATA, { x: 0, y: 0, w: W, h: H });
    computeFrozenLayout({ x: 0, y: 0, w: W, h: H });
    for (let i = 0; i < DATA.length; i++) currentLayout[i] = { ...targetLayout[i] };
    applyLayout();
  }, 200);
});

})();
</script>
</body>
</html>
